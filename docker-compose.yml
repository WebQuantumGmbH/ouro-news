services:
  app:
    build: .
    image: ouro-news:latest
    restart: unless-stopped
    ports:
      - "4323:4323"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4323
      NODE_ENV: production
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-ingestion:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["npx", "tsx", "workers/ingestion.ts"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analysis:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["npx", "tsx", "workers/analysis.ts"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ouronews
      MYSQL_USER: ouronews
      MYSQL_PASSWORD: ouronews_secret
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  redis_data:
